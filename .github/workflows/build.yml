name: Build
run-name: Build '${{ github.ref_name }}'
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v5
    - name: JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: xvfb-run -- mvn -B package
    - name: Upload logs
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: Logs
        path: logs/**
        retention-days: 2
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: build/test-resultaten/*
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: (!cancelled())
      with:
        files: |
          build/test-resultaten/**/*.xml
    - name: Build test report
      run: sh scripts/test-report.sh
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: test-report
        path: build/test-report/**
        retention-days: 2
    - name: Clean-up
      run: rm -rf build