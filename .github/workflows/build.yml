name: Build
run-name: Build '${{ github.ref_name }}'
on: [push, pull_request]
env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  GIT_COMMIT: ${{ github.sha }}
  GIT_URL: ${{ github.repositoryUrl }}
  BUILD_NUMBER: ${{ github.run_number }}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v5
    - name: JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Set-up Zensical
      run: pip install zensical
    - name: Set version
      run: bash scripts/set-version.sh "${BRANCH_NAME}"
    - name: Build with Maven
      run: xvfb-run -- mvn -B package
    - name: Upload logs
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: Logs
        path: logs/**
        retention-days: 2
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: build/test-resultaten/*
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: (!cancelled())
      with:
        files: |
          build/test-resultaten/**/*.xml
    - name: Build test report
      run: sh scripts/test-report.sh
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: test-report
        path: build/test-report/**
        retention-days: 2
    - uses: actions/upload-artifact@v7
      id: artifact-upload-alef-windows
      if: ${{ success() && github.event_name == 'pull_request' }}
      with:
        name: 'ALEF Windows'
        path: build/artifacts/alef-distribution/alef-windows.zip
        archive: false
        retention-days: 2
    - uses: actions/upload-artifact@v7
      id: artifact-upload-alef-linux
      if: ${{ success() && github.event_name == 'pull_request' }}
      with:
        name: 'ALEF Linux'
        path: build/artifacts/alef-distribution/alef-linux.tar.gz
        archive: false
        retention-days: 2
    - uses: actions/upload-artifact@v7
      id: artifact-upload-alef-macos
      if: ${{ success() && github.event_name == 'pull_request' }}
      with:
        name: 'ALEF macOS'
        path: build/artifacts/alef-distribution/alef-MacOSaarch64.zip
        archive: false
        retention-days: 2
    - name: Add artifact comment on PR
      if: ${{ success() && github.event_name == 'pull_request' }}
      run: |
           comment=$(cat << EOM
           ALEF distributions (artifacts are deleted in 2 days):
           * [Windows](${{ steps.artifact-upload-alef-windows.outputs.artifact-url }})
           * [Linux](${{ steps.artifact-upload-alef-linux.outputs.artifact-url }})
           * [macOS](${{ steps.artifact-upload-alef-macos.outputs.artifact-url }})
           EOM
           )
           gh pr comment ${{ github.event.number }} --body "$comment"
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
    - name: Clean-up
      run: rm -rf build